<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title id="page-title">Meeting Room · LINE</title>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/1040/1040244.png">

    <!-- Preload Critical Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://static.line-scdn.net">
    
    <!-- Critical CSS - Inlined for fastest rendering -->
    <style>
        /* Critical CSS - ใช้เท่าที่จำเป็นสำหรับ First Paint */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #06c755;
            --primary-dark: #05b34a;
            --bg: #0a0a0f;
            --bg-card: #1a1d24;
            --border: #2a2e36;
            --text: #ffffff;
            --text-secondary: #9ca3af;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding-bottom: 70px;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .navbar-logo i {
            color: var(--primary);
            font-size: 24px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 29, 36, 0.95);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            font-size: 12px;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Skeleton loading - แสดงทันที */
        .skeleton-room {
            background: linear-gradient(90deg, #1a1d24 25%, #2a2e36 50%, #1a1d24 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 20px;
            height: 300px;
            margin-bottom: 16px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .hide {
            display: none !important;
        }

        /* Desktop styles */
        @media (min-width: 1024px) {
            .rooms-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                max-width: 1200px;
                margin: 0 auto;
                padding: 0 16px;
            }

            .bottom-nav {
                max-width: 400px;
                left: 50%;
                transform: translateX(-50%);
                border-radius: 50px;
                margin-bottom: 10px;
            }
        }

        @media (max-width: 1023px) {
            .rooms-grid {
                display: flex;
                flex-direction: column;
                gap: 16px;
                padding: 0 16px;
            }
        }
    </style>

    <!-- Non-critical CSS - โหลดแบบ async -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    
    <!-- Fallback for no JavaScript -->
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </noscript>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div class="navbar-content">
            <div class="navbar-logo">
                <i class="fas fa-door-open"></i>
                <span style="font-weight: 600; background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Meeting Room</span>
            </div>
            <div style="display: flex; gap: 16px; align-items: center;">
                <span id="navbar-user" style="font-size: 14px; color: var(--text-secondary);"></span>
                <i class="fas fa-user-circle" style="font-size: 24px; cursor: pointer;" id="profile-icon"></i>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" style="max-width: 1200px; margin: 0 auto; padding: 20px 16px;">
        <!-- Loading State - แสดงทันที -->
        <div id="init-loading">
            <div class="skeleton-room"></div>
            <div class="skeleton-room"></div>
            <div class="skeleton-room"></div>
        </div>

        <!-- Rooms Tab - แสดงทันที -->
        <div id="rooms-tab" class="tab-content active">
            <div id="rooms-list" class="rooms-grid">
                <!-- Pre-render skeleton ใน HTML -->
                <div class="skeleton-room"></div>
                <div class="skeleton-room"></div>
                <div class="skeleton-room"></div>
            </div>
        </div>

        <!-- Other Tabs (hidden initially) -->
        <div id="bookings-tab" class="tab-content"></div>
        <div id="calendar-tab" class="tab-content"></div>
        <div id="profile-tab" class="tab-content"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" data-nav="rooms">
            <i class="fas fa-door-open"></i>
            <span>ห้อง</span>
        </div>
        <div class="nav-item" data-nav="bookings">
            <i class="fas fa-calendar"></i>
            <span>จอง</span>
        </div>
        <div class="nav-item" data-nav="calendar">
            <i class="fas fa-calendar-alt"></i>
            <span>ปฏิทิน</span>
        </div>
        <div class="nav-item" data-nav="profile">
            <i class="fas fa-user"></i>
            <span>โปรไฟล์</span>
        </div>
    </div>

    <!-- Optimized Script Loading -->
    <script>
        // ========== CONFIG ==========
        const CONFIG = {
            GAS_URL: 'https://script.google.com/macros/s/AKfycbwEkTSINEvnyBdapUWbJ8djVpdLt6rN7NlaXn5cKMow7RJtY3gI19-RSMyFHsWBxII-vA/exec',
            LIFF_ID: '2009198981-GsqxkwIK',
            CACHE_TTL: 15 * 60 * 1000, // 15 minutes
            MAX_RETRY: 2,
            API_TIMEOUT: 5000, // ลดลงจาก 8000ms
            DEBOUNCE_RENDER: 150 // ลดลงจาก 300ms
        };

        // ========== STATE ==========
        const state = {
            user: null,
            rooms: [],
            role: 'user',
            initialized: false
        };

        // ========== DOM CACHE ==========
        const $ = {
            initLoading: document.getElementById('init-loading'),
            roomsList: document.getElementById('rooms-list'),
            navbarUser: document.getElementById('navbar-user')
        };

        // ========== FAST INIT ==========
        (function fastInit() {
            // โหลดข้อมูลจาก cache ทันที
            try {
                const cachedUser = localStorage.getItem('user_cache');
                if (cachedUser) {
                    state.user = JSON.parse(cachedUser);
                    state.role = state.user?.role || 'user';
                    if ($.navbarUser && state.user?.displayName) {
                        $.navbarUser.textContent = state.user.displayName;
                    }
                }

                const cachedRooms = localStorage.getItem('rooms_cache');
                if (cachedRooms) {
                    state.rooms = JSON.parse(cachedRooms) || [];
                    // แสดง rooms ทันทีจาก cache
                    if ($.roomsList && state.rooms.length > 0) {
                        renderRoomsFromCache();
                    }
                }
            } catch (e) {
                console.warn('Cache read error:', e);
            }

            // ซ่อน skeleton loading เร็วขึ้น
            setTimeout(() => {
                if ($.initLoading) $.initLoading.classList.add('hide');
            }, 300);
        })();

        // ========== RENDER FROM CACHE ==========
        function renderRoomsFromCache() {
            if (!$.roomsList || !state.rooms.length) return;
            
            const html = state.rooms.slice(0, 6).map(room => `
                <div class="room-card" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; cursor: pointer;" onclick="selectRoom('${room.roomId}')">
                    <div style="width: 100%; height: 160px; background: linear-gradient(135deg, #2a2e36, #1a1d24); display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-door-open" style="font-size: 48px; color: var(--primary);"></i>
                    </div>
                    <div style="padding: 16px;">
                        <div style="font-weight: 600; margin-bottom: 8px;">${room.name || 'ห้องประชุม'}</div>
                        <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">
                            <i class="fas fa-users"></i> ความจุ: ${room.capacity || 0} คน
                        </div>
                        <div style="padding: 4px 10px; border-radius: 20px; font-size: 11px; background: rgba(6,199,85,0.15); color: var(--primary); border: 1px solid rgba(6,199,85,0.3); display: inline-block;">
                            <i class="fas fa-check-circle"></i> ว่าง
                        </div>
                    </div>
                </div>
            `).join('');
            
            $.roomsList.innerHTML = html;
        }

        // ========== LAZY LOAD LIFF ==========
        function loadLiffSDK() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://static.line-scdn.net/liff/edge/2.1/sdk.js';
                script.async = true;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        // ========== LAZY LOAD SWEETALERT ==========
        function loadSweetAlert() {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/sweetalert2@11';
            script.defer = true;
            document.head.appendChild(script);
        }

        // ========== OPTIMIZED API CALL ==========
        async function callGAS(path, data = {}, retryCount = 0) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), CONFIG.API_TIMEOUT);

                const formData = new FormData();
                formData.append('path', path);
                if (state.user?.lineUserId) formData.append('lineUserId', state.user.lineUserId);

                Object.keys(data).forEach(key => {
                    if (data[key] !== undefined && data[key] !== null) {
                        formData.append(key, data[key]);
                    }
                });

                const res = await fetch(CONFIG.GAS_URL, {
                    method: 'POST',
                    body: formData,
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                const text = await res.text();
                return JSON.parse(text);
            } catch (error) {
                if (retryCount < CONFIG.MAX_RETRY) {
                    await new Promise(resolve => setTimeout(resolve, 500 * (retryCount + 1)));
                    return callGAS(path, data, retryCount + 1);
                }
                return { success: false, message: 'connection error' };
            }
        }

        // ========== LAZY INIT ==========
        async function lazyInit() {
            try {
                // Load dependencies แบบ non-blocking
                loadSweetAlert();
                await loadLiffSDK();

                if (typeof liff !== 'undefined') {
                    await liff.init({ liffId: CONFIG.LIFF_ID });

                    if (!liff.isLoggedIn()) {
                        liff.login({ scope: 'openid email profile', prompt: 'consent' });
                        return;
                    }

                    // Load data แบบ parallel
                    const [profile, roomsResult] = await Promise.all([
                        liff.getProfile().catch(() => null),
                        callGAS('rooms').catch(() => ({ success: false, data: state.rooms }))
                    ]);

                    if (profile) {
                        const userResult = await callGAS('user/profile', {
                            lineUserId: profile.userId,
                            displayName: profile.displayName,
                            pictureUrl: profile.pictureUrl || '',
                            source: 'miniapp'
                        });

                        if (userResult.success) {
                            state.user = userResult.data;
                            state.role = state.user.role || 'user';
                            localStorage.setItem('user_cache', JSON.stringify(state.user));
                            if ($.navbarUser && state.user.displayName) {
                                $.navbarUser.textContent = state.user.displayName;
                            }
                        }
                    }

                    if (roomsResult.success && roomsResult.data) {
                        state.rooms = roomsResult.data;
                        localStorage.setItem('rooms_cache', JSON.stringify(state.rooms));
                        renderRoomsFromCache();
                    }

                    state.initialized = true;
                }
            } catch (error) {
                console.warn('Lazy init error:', error);
            }
        }

        // ========== TAB NAVIGATION ==========
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const tab = this.dataset.nav;
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                const tabEl = document.getElementById(`${tab}-tab`);
                if (tabEl) tabEl.classList.add('active');
            });
        });

        // ========== SELECT ROOM ==========
        window.selectRoom = function(roomId) {
            console.log('Selected room:', roomId);
            // สามารถเพิ่ม SweetAlert2 ได้เมื่อโหลดเสร็จ
            if (window.Swal) {
                window.Swal.fire({
                    title: 'เลือกห้อง',
                    text: `คุณเลือกห้อง ${roomId}`,
                    icon: 'info',
                    confirmButtonColor: '#06c755'
                });
            }
        };

        // ========== START LAZY INIT ==========
        // ใช้ requestIdleCallback หรือ setTimeout เพื่อไม่ให้ blocking การแสดงผล
        if ('requestIdleCallback' in window) {
            requestIdleCallback(() => lazyInit(), { timeout: 2000 });
        } else {
            setTimeout(lazyInit, 100);
        }

        // Service Worker (optional)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
