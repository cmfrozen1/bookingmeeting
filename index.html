<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title id="page-title">Meeting Room · LINE</title>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/1040/1040244.png">
    
    <!-- Preconnect และ Preload ที่สำคัญ -->
    <link rel="preconnect" href="https://static.line-scdn.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <!-- Preload Critical CSS -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" as="style">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&display=swap" as="style">
    
    <!-- Tailwind CSS (โหลดแบบ non-blocking) -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" media="print" onload="this.media='all'">
    
    <!-- Fonts (โหลดแบบ non-blocking) -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    
    <!-- Font Awesome (โหลดแบบ non-blocking) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
    
    <!-- LINE LIFF (โหลด async) -->
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js" async></script>
    
    <!-- SweetAlert2 (โหลดแบบ deferred) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    
    <style>
        /* Critical CSS - โหลดก่อนทันที */
        * {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #06c755;
            --primary-dark: #05b34a;
            --primary-light: rgba(6,199,85,0.1);
            --bg: #0a0a0f;
            --bg-card: #1a1d24;
            --border: #2a2e36;
            --text: #ffffff;
            --text-secondary: #9ca3af;
            --navbar-bg: rgba(10, 10, 15, 0.95);
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 70px;
        }
        
        /* Essential Layout */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 40;
            background: var(--navbar-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 50;
            background: rgba(26, 29, 36, 0.95);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Loading States */
        .initial-loading {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Skeleton Loading - แสดงทันที */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 16px;
            padding: 0 16px;
        }
        
        @media (min-width: 1024px) {
            .rooms-grid {
                grid-template-columns: repeat(3, 1fr);
                max-width: 1200px;
                margin: 0 auto;
            }
        }
        
        .skeleton-room {
            background: linear-gradient(90deg, var(--bg-card) 25%, #252930 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: loading 1.2s infinite ease-in-out;
            border-radius: 20px;
            height: 200px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Non-critical CSS จะโหลดทีหลัง */
    </style>
    
    <!-- Non-critical CSS (โหลดแบบ async) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
</head>
<body>
    <!-- Initial Loading -->
    <div class="initial-loading" id="initial-loading">
        <div class="loading-spinner"></div>
        <div class="loading-text mt-4 text-[#06c755]">กำลังโหลด...</div>

    <!-- Floating Book Button (ซ่อนไว้ก่อน) -->

    <!-- Navbar -->

    <!-- Main Content -->
    <div class="min-h-screen">
        <!-- Tab: Home -->
        <div id="tab-home" class="tab-content active">
            <!-- Profile Header (Skeleton) -->
            <div class="profile-header max-w-7xl mx-auto m-4 p-4 bg-[#1a1d24] rounded-xl border border-[#2a2e36] flex items-center gap-4 cursor-pointer" id="profile-header">
                <div id="profile-avatar-skeleton" class="w-[60px] h-[60px] rounded-full bg-[#2a2e36] animate-pulse"></div>
                <div class="flex-1">
                    <div id="profile-name-skeleton" class="h-6 w-32 bg-[#2a2e36] rounded mb-2 animate-pulse"></div>
                    <div id="profile-email-skeleton" class="h-4 w-48 bg-[#2a2e36] rounded animate-pulse"></div>
                </div>

            <!-- Quick Actions -->
            <div class="quick-actions max-w-7xl mx-auto px-4 flex gap-2 mb-4">
                <div class="quick-action-btn flex-1 bg-[#1a1d24] border border-[#2a2e36] rounded-xl p-3 text-center cursor-pointer" onclick="showBookingModal()">
                    <div class="quick-action-icon text-[#06c755] text-xl mb-1"><i class="fas fa-calendar-plus"></i></div>
                    <div class="quick-action-label text-xs text-gray-400">จองด่วน</div>
                </div>
                <div class="quick-action-btn flex-1 bg-[#1a1d24] border border-[#2a2e36] rounded-xl p-3 text-center cursor-pointer" onclick="goToToday()">
                    <div class="quick-action-icon text-[#06c755] text-xl mb-1"><i class="fas fa-calendar-day"></i></div>

            <!-- Stats (Skeleton) -->

                    <div class="h-8 bg-[#2a2e36] rounded animate-pulse"></div>
                    <div class="h-8 bg-[#2a2e36] rounded animate-pulse"></div>
                    <div class="h-8 bg-[#2a2e36] rounded animate-pulse"></div>
                    <div class="h-8 bg-[#2a2e36] rounded animate-pulse"></div>
                    <div class="h-8 bg-[#2a2e36] rounded animate-pulse"></div>
                    <div class="h-8 bg-[#2a2e36] rounded animate-pulse"></div>
                    <div class="h-8 bg-[#2a2e36] rounded animate-pulse"></div>
                </div>
            </div>

            <!-- Search -->
            <div class="search-box max-w-7xl mx-auto px-4 mb-4">
                <i class="fas fa-search absolute left-7 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="search-input" placeholder="ค้นหาห้องประชุม..." autocomplete="off" 
                       class="w-full p-3 pl-11 bg-[#1a1d24] border border-[#2a2e36] rounded-full text-white focus:outline-none focus:border-[#06c755]">

            <!-- Rooms List (Skeleton แสดงทันที) -->
            <div id="rooms-list" class="rooms-grid">

        <!-- Tab: My Bookings (ซ่อนไว้ก่อน) -->
        <div id="tab-my" class="tab-content hidden">
            <!-- Content จะโหลดเมื่อเข้าแท็บนี้ -->

        <!-- Tab: Admin (ซ่อนไว้ก่อน) -->

            <!-- Content จะโหลดเมื่อเข้าแท็บนี้ -->

    <!-- Bottom Navigation -->
    <div class="bottom-nav max-w-md mx-auto rounded-t-2xl">

    <!-- Modals (ย่อขนาดและซ่อนไว้) -->
    <div class="modal fixed inset-0 bg-black/98 z-50 hidden" id="room-modal"><!-- content --></div>
    <div class="modal fixed inset-0 bg-black/98 z-50 hidden" id="booking-modal"><!-- content --></div>

    <div class="modal fixed inset-0 bg-black/98 z-50 hidden" id="room-create-modal"><!-- content --></div>
    <div class="modal fixed inset-0 bg-black/98 z-50 hidden" id="profile-modal"><!-- content --></div>
    <div class="modal fixed inset-0 bg-black/98 z-50 hidden" id="role-modal"><!-- content --></div>
    <div class="modal fixed inset-0 bg-black/98 z-50 hidden" id="delete-user-modal"><!-- content --></div>

    <script>
        // ========== CONFIG ==========
        const CONFIG = {
            GAS_URL: 'https://script.google.com/macros/s/AKfycbwEkTSINEvnyBdapUWbJ8djVpdLt6rN7NlaXn5cKMow7RJtY3gI19-RSMyFHsWBxII-vA/exec',
            LIFF_ID: '2009198981-GsqxkwIK',
            CACHE_TTL: 10 * 60 * 1000, // เพิ่มเป็น 10 นาที
            MAX_RETRY: 2
        };

        // ========== STATE (โหลดจาก cache ทันที) ==========
        const state = {
            user: null,
            rooms: [],
            bookings: [],
            myBookings: [],
            pendingBookings: [],
            users: [],
            currentDate: new Date(),
            currentMonth: new Date(),
            selectedDate: new Date(),
            dateBookings: {},
            currentRoom: null,
            currentBooking: null,
            role: 'user',
            isAdmin: false,
            isManager: false,
            settings: { appName: 'Meeting Room', requireApproval: 'true', reminderMinutes: '30' },
            userSettings: { notificationsEnabled: true },
            initialized: false,
            userNamesCache: {},
            autoCancelStats: { today: 0, lastRun: null },
            loading: { rooms: false, bookings: false, users: false },
            cacheTimestamps: {}
        };

        // โหลดจาก localStorage ทันที
        try {
            const savedUser = localStorage.getItem('user_cache');
            if (savedUser) {
                state.user = JSON.parse(savedUser);
                state.role = state.user.role || 'user';
                state.isAdmin = state.role === 'admin';
                state.isManager = state.isAdmin || state.role === 'manager';
            }

            const savedRooms = localStorage.getItem('rooms_cache');
            if (savedRooms) {
                state.rooms = JSON.parse(savedRooms);
            }

            const savedSettings = localStorage.getItem('settings_cache');
            if (savedSettings) {
                state.settings = JSON.parse(savedSettings);
            }

            const savedUserSettings = localStorage.getItem('user_settings_cache');
            if (savedUserSettings) {
                state.userSettings = JSON.parse(savedUserSettings);
            }

            // แสดง UI ทันทีจาก cache
            if (state.user) {
                updateUserUIFromCache();
            }
            if (state.rooms.length > 0) {
                renderRoomsFromCache();
            }
        } catch (e) {
            console.warn('Cache load error:', e);
        }

        // ========== DOM Cache (เฉพาะที่จำเป็น) ==========
        const $ = {
            initLoading: document.getElementById('initial-loading'),
            roomsList: document.getElementById('rooms-list'),
            profileName: document.getElementById('profile-name-skeleton'),
            profileEmail: document.getElementById('profile-email-skeleton'),
            profileAvatar: document.getElementById('profile-avatar-skeleton'),
            navItems: document.querySelectorAll('.nav-item'),
            managerAdmin: document.querySelectorAll('.manager-admin'),
            searchInput: document.getElementById('search-input')
        };

        // ========== FAST UI UPDATE ==========
        function updateUserUIFromCache() {
            if (!state.user) return;
            
            const profileHeader = document.getElementById('profile-header');
            if (profileHeader) {
                profileHeader.innerHTML = `
                    <img id="profile-avatar" src="${state.user.pictureUrl || 'https://via.placeholder.com/60'}" class="w-[60px] h-[60px] rounded-full border-3 border-[#06c755] object-cover">
                    <div class="flex-1">
                        <h2 class="text-lg font-bold">${state.user.displayName || 'ผู้ใช้'}</h2>
                        <p class="text-sm text-gray-400">${state.user.email || ''}</p>
                        <p class="text-xs text-[#06c755] mt-1">${state.user.role === 'admin' ? '👑 ผู้ดูแลระบบ' : state.user.role === 'manager' ? '👥 ผู้จัดการ' : '👤 ผู้ใช้ทั่วไป'}</p>
                    </div>
                    <i class="fas fa-chevron-down text-gray-400"></i>
                `;
            }

            if (state.isManager) {
                $.managerAdmin.forEach(el => el.classList.remove('hidden'));
            }
        }

        function renderRoomsFromCache() {
            if (!state.rooms.length || !$.roomsList) return;
            
            $.roomsList.innerHTML = state.rooms.map(r => `
                <div class="room-card bg-[#1a1d24] border border-[#2a2e36] rounded-xl overflow-hidden cursor-pointer" onclick="showRoomDetail('${r.roomId}')">
                    <div class="room-image h-40 bg-gradient-to-br from-[#2a2e36] to-[#1a1d24] flex items-center justify-center">
                        ${r.imageUrl ? 
                            `<img src="${r.imageUrl}" class="w-full h-full object-cover" loading="lazy">` : 
                            `<i class="fas fa-door-open text-4xl text-[#06c755]"></i>`
                        }
                    </div>
                    <div class="room-content p-4">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-semibold">${r.name}</h3>
                            <span class="capacity-badge bg-[#06c755]/10 text-[#06c755] px-2 py-1 rounded-full text-xs">
                                <i class="fas fa-users mr-1"></i>${r.capacity}
                            </span>
                        </div>
                        <p class="text-sm text-gray-400 mb-2"><i class="fas fa-map-marker-alt mr-1"></i> ${r.location || ''}</p>
                        <div class="flex justify-between items-center">
                            <span class="badge badge-available bg-[#06c755]/10 text-[#06c755] border border-[#06c755]/30 px-3 py-1 rounded-full text-xs">ว่าง</span>
                            <button class="text-[#06c755] text-sm" onclick="showBookingModal('${r.roomId}'); event.stopPropagation();">
                                <i class="fas fa-calendar-plus mr-1"></i>จอง
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ========== FAST LIFF INIT ==========
        async function initLIFF() {
            try {
                // แสดง UI ทันทีจาก cache
                if (state.user) {
                    updateUserUIFromCache();
                }

                await liff.init({ liffId: CONFIG.LIFF_ID });
                
                if (!liff.isLoggedIn()) {
                    liff.login({ scope: 'openid email profile', prompt: 'consent' });
                    return;
                }

                // โหลดข้อมูลพร้อมกันทั้งหมดแบบ Parallel
                const [profile, tokenPayload] = await Promise.all([
                    liff.getProfile(),
                    liff.getIDToken() ? parseJwt(liff.getIDToken()) : {}
                ]);

                const userData = {
                    lineUserId: profile.userId,
                    displayName: profile.displayName,
                    pictureUrl: profile.pictureUrl || '',
                    email: tokenPayload.email || '',
                    source: 'miniapp'
                };

                // โหลดข้อมูลจำเป็นพร้อมกัน
                const [userResult, roomsResult] = await Promise.all([
                    callGAS('user/profile', userData),
                    callGAS('rooms')
                ]);

                // อัปเดต state
                if (userResult.success) {
                    state.user = userResult.data;
                    state.role = state.user.role || 'user';
                    state.isAdmin = state.role === 'admin';
                    state.isManager = state.isAdmin || state.role === 'manager';
                    localStorage.setItem('user_cache', JSON.stringify(state.user));
                    updateUserUIFromCache();
                }

                if (roomsResult.success) {
                    state.rooms = roomsResult.data || [];
                    localStorage.setItem('rooms_cache', JSON.stringify(state.rooms));
                    localStorage.setItem('rooms_cache_timestamp', Date.now().toString());
                    renderRoomsFromCache();
                }

                // โหลดข้อมูลอื่นๆ แบบ Lazy หลังจากแสดง UI แล้ว
                setTimeout(() => {
                    loadLazyData();
                }, 100);

                // ซ่อน loading
                $.initLoading.classList.add('hide');
                setTimeout(() => $.initLoading.style.display = 'none', 200);

            } catch (error) {
                console.error('LIFF init error:', error);
                $.initLoading.classList.add('hide');
                setTimeout(() => $.initLoading.style.display = 'none', 200);
            }
        }

        // โหลดข้อมูลที่ไม่จำเป็นต้องใช้ทันที
        async function loadLazyData() {
            try {
                // โหลดทีละอย่าง ไม่ต้องรอกัน
                loadMonthBookings(state.currentMonth.getFullYear(), state.currentMonth.getMonth());
                loadTodayStats();
                loadMyBookings();
                
                if (state.isManager) {
                    setTimeout(() => {
                        loadPendingBookings();
                        loadAllBookings();
                        loadUsers();
                        loadRoomsManagement();
                    }, 500);
                }

                // ตรวจสอบ auto-cancel ทุก 5 นาที
                setInterval(autoCancelOverdueBookings, 5 * 60 * 1000);
                setTimeout(autoCancelOverdueBookings, 5000);
            } catch (e) {
                console.warn('Lazy load error:', e);
            }
        }

        // ========== OPTIMIZED API CALL ==========
        async function callGAS(path, data = {}, retryCount = 0) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000); // ลด timeout เหลือ 8 วินาที

            try {
                const formData = new FormData();
                formData.append('path', path);
                if (state.user?.lineUserId) formData.append('lineUserId', state.user.lineUserId);
                
                Object.keys(data).forEach(key => {
                    if (data[key] !== undefined && data[key] !== null) {
                        formData.append(key, data[key]);
                    }
                });

                const res = await fetch(CONFIG.GAS_URL, { 
                    method: 'POST', 
                    body: formData,
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                const text = await res.text();
                return JSON.parse(text);
            } catch (error) {
                clearTimeout(timeoutId);
                console.error('API Error:', error);
                
                if (retryCount < CONFIG.MAX_RETRY) {
                    await new Promise(resolve => setTimeout(resolve, 500 * (retryCount + 1)));
                    return callGAS(path, data, retryCount + 1);
                }
                
                return { success: false, message: 'connection error' };
            }
        }

        // ========== LAZY FUNCTIONS (เรียกเมื่อจำเป็น) ==========
        async function loadMonthBookings(year, month) {
            try {
                const startDate = new Date(year, month, 1);
                const endDate = new Date(year, month + 1, 0);
                
                const result = await callGAS('bookings', {
                    startDate: formatDateForInput(startDate),
                    endDate: formatDateForInput(endDate),
                    showPast: 'true'
                });
                
                if (result.success) {
                    state.dateBookings = {};
                    result.data.bookings.forEach(booking => {
                        const date = new Date(booking.startTime).toISOString().split('T')[0];
                        if (!state.dateBookings[date]) state.dateBookings[date] = [];
                        state.dateBookings[date].push(booking);
                    });
                    
                    // อัปเดต calendar เฉพาะเมื่อ active tab
                    if (document.getElementById('tab-home').classList.contains('active')) {
                        renderCalendar();
                    }
                }
            } catch (error) {
                console.error('Load month bookings error:', error);
            }
        }

        async function loadTodayStats() {
            try {
                const result = await callGAS('admin/stats');
                if (result.success) {
                    document.getElementById('stat-rooms').textContent = result.data.rooms || 0;
                    document.getElementById('stat-today').textContent = result.data.today || 0;
                    document.getElementById('stat-pending').textContent = result.data.pending || 0;
                }
            } catch (error) {
                console.error('Load stats error:', error);
            }
        }

        async function loadMyBookings() {
            if (!state.user) return;
            try {
                const result = await callGAS('user/bookings', { lineUserId: state.user.lineUserId });
                if (result.success) {
                    state.myBookings = result.data || [];
                }
            } catch (error) {
                console.error('Load my bookings error:', error);
            }
        }

        // ========== UTILS ==========
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => 
                    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
                ).join(''));
                return JSON.parse(jsonPayload);
            } catch(e) {
                return {};
            }
        }

        function formatDateForInput(date) {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function showToast(msg, type = 'success') {
            // Simple toast
            alert(msg); // Fallback to alert for speed
        }

        // ========== TAB SWITCHING ==========
        window.switchTab = function(tab) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll(`[data-tab="${tab}"]`).forEach(i => i.classList.add('active'));
            
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');

            if (tab === 'my') {
                loadMyBookings();
                renderMyBookings();
            }
            if (tab === 'admin' && state.isManager) {
                loadAdminData();
            }
        };

        window.goHome = () => switchTab('home');
        window.showBookingModal = (roomId) => alert('จองห้อง: ' + roomId); // Simple for now
        window.goToToday = () => {};
        window.showAllRooms = () => {};

        // ========== EVENT LISTENERS ==========
        let searchTimer;
        $.searchInput?.addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                if (state.rooms.length > 0) renderRoomsFromCache();
            }, 300);
        });

        $.navItems.forEach(item => {
            item.addEventListener('click', () => switchTab(item.dataset.tab));
        });

        document.getElementById('profile-header')?.addEventListener('click', () => {
            alert('Profile: ' + (state.user?.displayName || 'Unknown'));
        });

        // ========== START ==========
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initLIFF);
        } else {
            initLIFF();
        }

        // Placeholder functions
        window.renderCalendar = () => {};
        window.renderMyBookings = () => {};
        window.loadAdminData = () => {};
        window.autoCancelOverdueBookings = () => {};
        window.showRoomDetail = (id) => alert('Room: ' + id);
    </script>
</body>
</html>
