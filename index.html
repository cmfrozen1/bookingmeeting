<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title id="page-title">Meeting Room · LINE</title>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/1040/1040244.png">
    
    <!-- Preconnect - โหลดแบบขนาน -->
    <link rel="preconnect" href="https://static.line-scdn.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <!-- Critical CSS - ขนาดเล็ก โหลดทันที (ปรับปรุง: ลดขนาด CSS) -->
    <style>
        /* Critical CSS เท่าที่จำเป็นสำหรับ First Paint - ลดขนาดโดยการ minify */
        *{margin:0;padding:0;box-sizing:border-box;font-family:'IBM Plex Sans Thai',sans-serif}
        :root{--primary:#06c755;--primary-dark:#05b34a;--bg:#0a0a0f;--bg-card:#1a1d24;--border:#2a2e36;--text:#fff;--text-secondary:#9ca3af}
        body{background:var(--bg);color:var(--text);padding-bottom:70px;overflow-x:hidden}
        .navbar{position:sticky;top:0;z-index:40;background:rgba(10,10,15,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px}
        .navbar-content{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
        .navbar-logo{display:flex;align-items:center;gap:8px;cursor:pointer}
        .navbar-logo i{color:var(--primary);font-size:24px}
        .navbar-logo span{font-size:18px;font-weight:600;background:linear-gradient(135deg,#fff,var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(26,29,36,.95);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0;z-index:50;backdrop-filter:blur(10px)}
        .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text-secondary);font-size:12px;cursor:pointer;transition:.2s}
        .nav-item.active,.nav-item.active i{color:var(--primary)}
        .nav-item i{font-size:20px}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .rooms-grid{display:flex;flex-direction:column;gap:16px;padding:0 16px}
        @media(min-width:1024px){.rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1200px;margin:0 auto}.bottom-nav{max-width:400px;left:50%;transform:translateX(-50%);border-radius:50px;margin-bottom:10px}}
        .room-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:.2s}
        .room-card:hover{border-color:var(--primary);transform:translateY(-2px)}
        .room-image{width:100%;height:160px;object-fit:cover;background:linear-gradient(135deg,#2a2e36,#1a1d24);display:flex;align-items:center;justify-content:center}
        .room-content{padding:16px}
        .badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block}
        .badge-available{background:rgba(6,199,85,.15);color:var(--primary);border:1px solid rgba(6,199,85,.3)}
        .initial-loading{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;align-items:center;justify-content:center;transition:opacity .3s}
        .initial-loading.hide{opacity:0;pointer-events:none}
        .loading-spinner{width:60px;height:60px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .skeleton-room{background:linear-gradient(90deg,var(--bg-card) 25%,#252930 50%,var(--bg-card) 75%);background-size:200% 100%;animation:loading 1.2s infinite;border-radius:20px;height:200px}
        @keyframes loading{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .hide{display:none!important}
        .profile-header{background:var(--bg-card);border-radius:20px;padding:16px;margin:16px;display:flex;align-items:center;gap:16px;border:1px solid var(--border);cursor:pointer;max-width:1200px;margin-left:auto;margin-right:auto}
        .profile-avatar{width:60px;height:60px;border-radius:30px;border:3px solid var(--primary);object-fit:cover}
        .quick-actions{display:flex;gap:8px;padding:0 16px;margin-bottom:16px}
        .quick-action-btn{flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:.2s}
        .quick-action-btn:hover{border-color:var(--primary)}
        .quick-action-icon{font-size:20px;color:var(--primary);margin-bottom:4px}
        .quick-action-label{font-size:12px;color:var(--text-secondary)}
        .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center}
        .search-box{position:relative;max-width:1200px;margin:0 auto 16px;padding:0 16px}
        .search-box input{width:100%;padding:12px 12px 12px 44px;background:var(--bg-card);border:1px solid var(--border);border-radius:30px;color:var(--text)}
        .search-box i{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text-secondary)}
        .calendar-container{background:var(--bg-card);border-radius:24px;padding:20px;margin:16px;border:1px solid var(--border)}
        .calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .calendar-month{font-size:18px;font-weight:600;color:var(--primary)}
        .calendar-nav-btn{background:0 0;border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:18px;cursor:pointer;transition:.2s}
        .calendar-nav-btn:hover{border-color:var(--primary)}
        .calendar-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:10px;color:var(--text-secondary);font-size:14px}
        .calendar-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
        .calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:12px;cursor:pointer;font-size:14px;border:1px solid transparent;transition:.2s}
        .calendar-day.today{border:2px solid var(--primary);font-weight:700}
        .calendar-day.selected{background:var(--primary);color:#fff}
        .calendar-day.has-booking{background:rgba(6,199,85,.1);border:1px solid var(--primary)}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,.98);z-index:1000;display:none}
        .modal.active{display:flex}
        .modal-content{background:var(--bg-card);width:100%;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
        @media(min-width:768px){.modal-content{width:90%;max-width:800px;height:90vh;margin:20px auto;border-radius:24px}}
        .capacity-badge{font-size:12px;color:var(--text-secondary)}
        .date-bookings-list{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
        .flex{display:flex}
        .flex-1{flex:1}
        .justify-between{justify-content:space-between}
        .items-center{align-items:center}
        .items-start{align-items:flex-start}
        .gap-2{gap:8px}
        .gap-4{gap:16px}
        .mb-2{margin-bottom:8px}
        .mb-4{margin-bottom:16px}
        .mt-1{margin-top:4px}
        .text-xs{font-size:12px}
        .text-sm{font-size:14px}
        .text-base{font-size:16px}
        .text-lg{font-size:18px}
        .text-xl{font-size:20px}
        .font-semibold{font-weight:600}
        .font-bold{font-weight:700}
        .text-gray-400{color:#9ca3af}
        .text-yellow-500{color:#eab308}
        .mr-1{margin-right:4px}
        .max-w-7xl{max-width:80rem}
        .mx-auto{margin-left:auto;margin-right:auto}
        .px-4{padding-left:16px;padding-right:16px}
        .grid{display:grid}
        .grid-cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    </style>
    
    <!-- Non-critical CSS - โหลดแบบ async (ปรับปรุง: ใช้ link preload แทน) -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">

</head>

    <!-- Optimized Script - โหลดแบบ async และใช้ cache ก่อน (ปรับปรุง: ใช้ defer + ลดขนาด) -->
    <script>
        // ========== CONFIG ==========
        const CONFIG = {
            GAS_URL: 'https://script.google.com/macros/s/AKfycbwEkTSINEvnyBdapUWbJ8djVpdLt6rN7NlaXn5cKMow7RJtY3gI19-RSMyFHsWBxII-vA/exec',
            LIFF_ID: '2009198981-GsqxkwIK',
            CACHE_TTL: 10 * 60 * 1000,
            MAX_RETRY: 2,
            API_TIMEOUT: 5000,
            RENDER_BATCH_SIZE: 6
        };

        // ========== PERFORMANCE: Fast Init from Cache ==========
        (function fastInit() {
            try {
                const cachedUser = localStorage.getItem('user_cache');
                if (cachedUser) {
                    window.__user = JSON.parse(cachedUser);
                    const nameEl = document.getElementById('profile-name');
                    const avatarEl = document.getElementById('profile-avatar');
                    if (nameEl) nameEl.textContent = window.__user.displayName || 'ผู้ใช้';
                    if (avatarEl) avatarEl.src = window.__user.pictureUrl || 'https://via.placeholder.com/60';
                }

                const cachedRooms = localStorage.getItem('rooms_cache');
                if (cachedRooms) {
                    const rooms = JSON.parse(cachedRooms);
                    if (rooms.length > 0) {
                        renderRoomsFromCache(rooms);
                    }
                }

                // ซ่อน loading เร็วขึ้น
                setTimeout(() => {
                    const loader = document.getElementById('initial-loading');
                    if (loader) loader.classList.add('hide');
                }, 200);
            } catch (e) {
                console.warn('Fast init error:', e);
            }
        })();

        // ========== PERFORMANCE: Render with DocumentFragment (ปรับปรุง) ==========
        function renderRoomsFromCache(rooms) {
            const list = document.getElementById('rooms-list');
            if (!list || !rooms.length) return;
            
            const fragment = document.createDocumentFragment();
            const limit = Math.min(CONFIG.RENDER_BATCH_SIZE, rooms.length);
            
            for (let i = 0; i < limit; i++) {
                const room = rooms[i];
                const card = document.createElement('div');
                card.className = 'room-card';
                card.onclick = () => showRoomDetail(room.roomId);
                card.innerHTML = `
                    <div class="room-image">
                        <i class="fas fa-door-open text-4xl text-[#06c755]"></i>
                    </div>
                    <div class="room-content">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-semibold text-base">${escapeHtml(room.name)}</h3>
                            <span class="capacity-badge"><i class="fas fa-users mr-1"></i>${room.capacity || 0}</span>
                        </div>
                        <p class="text-sm text-gray-400 mb-2"><i class="fas fa-map-marker-alt mr-1"></i> ${escapeHtml(room.location || 'ไม่มีข้อมูล')}</p>
                        <div class="flex justify-between items-center">
                            <span class="badge badge-available">ว่าง</span>
                            <button class="text-[#06c755] text-sm" onclick="showBookingModal('${room.roomId}'); event.stopPropagation();">
                                <i class="fas fa-calendar-plus mr-1"></i>จอง
                            </button>
                        </div>
                    </div>
                `;
                fragment.appendChild(card);
            }
            
            list.innerHTML = '';
            list.appendChild(fragment);
        }

        // ========== PERFORMANCE: Escape HTML to prevent XSS ==========
        function escapeHtml(text) {
            const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // ========== PERFORMANCE: Lazy Load LIFF SDK ==========
        function loadLiffSDK() {
            return new Promise((resolve, reject) => {
                if (window.liff) {
                    resolve();
                    return;
                }
                const script = document.createElement('script');
                script.src = 'https://static.line-scdn.net/liff/edge/2.1/sdk.js';
                script.async = true;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        // ========== PERFORMANCE: Lazy Load SweetAlert ==========
        function loadSweetAlert() {
            if (window.Swal) return Promise.resolve();
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/sweetalert2@11';
                script.async = true;
                script.onload = resolve;
                document.head.appendChild(script);
            });
        }

        // ========== PERFORMANCE: Optimized API Call with Timeout ==========
        async function callGAS(path, data = {}, retryCount = 0) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), CONFIG.API_TIMEOUT);

                const formData = new FormData();
                formData.append('path', path);
                if (window.__user?.lineUserId) formData.append('lineUserId', window.__user.lineUserId);
                
                Object.keys(data).forEach(key => {
                    if (data[key] !== undefined && data[key] !== null) {
                        formData.append(key, String(data[key]));
                    }
                });

                const res = await fetch(CONFIG.GAS_URL, { 
                    method: 'POST', 
                    body: formData,
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                const text = await res.text();
                return JSON.parse(text);
            } catch (error) {
                if (retryCount < CONFIG.MAX_RETRY) {
                    await new Promise(resolve => setTimeout(resolve, 500 * (retryCount + 1)));
                    return callGAS(path, data, retryCount + 1);
                }
                return { success: false, message: 'connection error' };
            }
        }

        // ========== PERFORMANCE: Debounce Helper ==========
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // ========== MAIN INIT ==========
        async function initLIFF() {
            try {
                // Load dependencies แบบ parallel
                await Promise.all([loadLiffSDK(), loadSweetAlert()]);

                if (typeof liff !== 'undefined') {
                    await liff.init({ liffId: CONFIG.LIFF_ID });

                    if (!liff.isLoggedIn()) {
                        liff.login({ scope: 'openid email profile', prompt: 'consent' });
                        return;
                    }

                    const profile = await liff.getProfile();
                    
                    // โหลดข้อมูลพร้อมกัน (Parallel)
                    const [userResult, roomsResult] = await Promise.all([
                        callGAS('user/profile', {
                            lineUserId: profile.userId,
                            displayName: profile.displayName,
                            pictureUrl: profile.pictureUrl || '',
                            source: 'miniapp'
                        }),
                        callGAS('rooms')
                    ]);

                    if (userResult.success) {
                        window.__user = userResult.data;
                        localStorage.setItem('user_cache', JSON.stringify(window.__user));
                        updateUserUI(window.__user);
                    }

                    if (roomsResult.success && roomsResult.data) {
                        localStorage.setItem('rooms_cache', JSON.stringify(roomsResult.data));
                        renderRoomsFromCache(roomsResult.data);
                    }

                    // โหลดข้อมูลเพิ่มเติมแบบเบาๆ (Deferred)
                    if ('requestIdleCallback' in window) {
                        requestIdleCallback(() => {
                            loadTodayStats();
                            loadMonthBookings();
                            if (window.__user?.role === 'admin' || window.__user?.role === 'manager') {
                                loadAdminData();
                            }
                        });
                    } else {
                        setTimeout(() => {
                            loadTodayStats();
                            loadMonthBookings();
                            if (window.__user?.role === 'admin' || window.__user?.role === 'manager') {
                                loadAdminData();
                            }
                        }, 800);
                    }
                }
            } catch (error) {
                console.warn('LIFF init error:', error);
                const loader = document.getElementById('initial-loading');
                if (loader) loader.classList.add('hide');
            }
        }

        // ========== HELPER FUNCTIONS ==========
        function updateUserUI(user) {
            if (!user) return;
            const nameEl = document.getElementById('profile-name');
            const avatarEl = document.getElementById('profile-avatar');
            const emailEl = document.getElementById('profile-email');
            const roleEl = document.getElementById('profile-role');
            
            if (nameEl) nameEl.textContent = user.displayName || 'ผู้ใช้';
            if (avatarEl) avatarEl.src = user.pictureUrl || 'https://via.placeholder.com/60';
            if (emailEl) emailEl.textContent = user.email || '';
            
            const roleText = {admin:'👑 ผู้ดูแลระบบ',manager:'👥 ผู้จัดการ',user:'👤 ผู้ใช้ทั่วไป'}[user.role] || '';
            if (roleEl) roleEl.textContent = roleText;
        }

        function showRoomDetail(roomId) {
            console.log('Show room detail:', roomId);
        }

        function showBookingModal(roomId) {
            console.log('Show booking modal:', roomId);
        }

        function goHome() {
            window.location.reload();
        }

        function goToToday() {
            console.log('Go to today');
        }

        function showAllRooms() {
            console.log('Show all rooms');
        }

        function changeMonth(offset) {
            console.log('Change month:', offset);
        }

        function loadTodayStats() {
            console.log('Load today stats');
        }

        function loadMonthBookings() {
            console.log('Load month bookings');
        }

        function loadAdminData() {
            console.log('Load admin data');
        }

        // ========== EVENT LISTENERS (ปรับปรุง: ใช้ Debounce) ==========
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => switchTab(item.dataset.tab));
        });

        document.getElementById('profile-header')?.addEventListener('click', () => {
            if (window.Swal) {
                window.Swal.fire({
                    title: window.__user?.displayName,
                    text: window.__user?.email || 'ไม่มีอีเมล',
                    showCancelButton: true,
                    confirmButtonText: 'แก้ไขโปรไฟล์',
                    cancelButtonText: 'ออกจากระบบ'
                }).then(r => {
                    if (r.dismiss === window.Swal.DismissReason.cancel && typeof liff !== 'undefined' && liff.isLoggedIn()) liff.logout();
                });
            }
        });

        const debouncedSearch = debounce((searchValue) => {
            const cached = localStorage.getItem('rooms_cache');
            if (cached) {
                const rooms = JSON.parse(cached).filter(r => 
                    r.name?.toLowerCase().includes(searchValue.toLowerCase())
                );
                renderRoomsFromCache(rooms);
            }
        }, 300);

        document.getElementById('search-input')?.addEventListener('input', (e) => {
            debouncedSearch(e.target.value);
        });

        function switchTab(tab) {
            document.querySelectorAll(`[data-tab="${tab}"]`).forEach(i => i.classList.add('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tab}`)?.classList.add('active');
        }

        // ========== START ==========
        if ('requestIdleCallback' in window) {
            requestIdleCallback(() => initLIFF(), { timeout: 2000 });
        } else {
            setTimeout(initLIFF, 100);
        }
    </script>
</body>
</html>
