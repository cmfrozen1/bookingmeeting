    <script>
        // ========== PERFORMANCE OPTIMIZATIONS ==========
        // 1. API Request Deduplication & Caching
        // 2. Lazy Loading for Admin Features
        // 3. Debounced Rendering
        // 4. Increased Cache TTL
        // 5. Optimized API Timeout
        // 6. Request Batching

        // ========== CONFIG ==========
        const CONFIG = {
            GAS_URL: 'https://script.google.com/macros/s/AKfycbwEkTSINEvnyBdapUWbJ8djVpdLt6rN7NlaXn5cKMow7RJtY3gI19-RSMyFHsWBxII-vA/exec',
            LIFF_ID: '2009198981-GsqxkwIK',
            PAGE_SIZE: 20,
            CACHE_TTL: 15 * 60 * 1000, // ✅ INCREASED: 15 นาที (from 5 min)
            MAX_RETRY: 2, // ✅ REDUCED: 2 retries (from 3)
            API_TIMEOUT: 8000, // ✅ OPTIMIZED: 8 seconds (from 15 sec)
            DEBOUNCE_RENDER: 300 // ✅ NEW: Debounce rendering
        };

        // ========== STATE ==========
        const state = {
            user: JSON.parse(localStorage.getItem('user_cache')) || null,
            rooms: JSON.parse(localStorage.getItem('rooms_cache')) || [],
            bookings: [],
            myBookings: [],
            pendingBookings: [],
            users: [],
            allBookings: [],
            settings: {},
            userSettings: { notificationsEnabled: true },
            currentMonth: new Date(),
            isManager: false,
            isAdmin: false,
            role: 'user',
            initialized: false,
            autoCancelRunning: false,
            autoCancelStats: { today: 0, total: 0 },
            userNamesCache: {},
            requestCache: {}, // ✅ NEW: Request deduplication cache
            pendingRequests: {} // ✅ NEW: Track pending requests
        };

        // ========== DOM CACHE ==========
        const $ = {
            initLoading: document.getElementById('init-loading'),
            roomsList: document.getElementById('rooms-list'),
            bookingsList: document.getElementById('bookings-list'),
            calendarContainer: document.getElementById('calendar-container'),
            profileContainer: document.getElementById('profile-container'),
            tabNav: document.getElementById('tab-nav'),
            mainContent: document.getElementById('main-content'),
            profileIcon: document.getElementById('profile-icon'),
            navbarUser: document.getElementById('navbar-user')
        };

        // ========== CACHE MANAGEMENT ==========
        function isCacheValid(cacheKey, maxAge = CONFIG.CACHE_TTL) {
            const timestamp = localStorage.getItem(`${cacheKey}_timestamp`);
            if (!timestamp) return false;
            const age = Date.now() - parseInt(timestamp);
            return age < maxAge;
        }

        function updateCacheTimestamp(cacheKey) {
            localStorage.setItem(`${cacheKey}_timestamp`, Date.now().toString());
        }

        // ========== REQUEST DEDUPLICATION ==========
        // ✅ NEW: Prevent duplicate API calls
        async function callGASWithDedup(path, data = {}, retryCount = 0) {
            const cacheKey = `api_${path}_${JSON.stringify(data)}`;
            
            // Return pending request if exists
            if (state.pendingRequests[cacheKey]) {
                return state.pendingRequests[cacheKey];
            }

            // Return cached result if valid
            if (state.requestCache[cacheKey] && isCacheValid(`req_${cacheKey}`)) {
                return state.requestCache[cacheKey];
            }

            const promise = callGAS(path, data, retryCount);
            state.pendingRequests[cacheKey] = promise;

            try {
                const result = await promise;
                state.requestCache[cacheKey] = result;
                updateCacheTimestamp(`req_${cacheKey}`);
                return result;
            } finally {
                delete state.pendingRequests[cacheKey];
            }
        }

        // ========== API CALL WITH RETRY ==========
        async function callGAS(path, data = {}, retryCount = 0) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), CONFIG.API_TIMEOUT); // ✅ OPTIMIZED timeout

                const formData = new FormData();
                formData.append('path', path);
                if (state.user?.lineUserId) formData.append('lineUserId', state.user.lineUserId);
                
                Object.keys(data).forEach(key => {
                    if (data[key] !== undefined && data[key] !== null) {
                        formData.append(key, data[key]);
                    }
                });

                const res = await fetch(CONFIG.GAS_URL, { 
                    method: 'POST', 
                    body: formData,
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                const text = await res.text();
                return JSON.parse(text);
            } catch (error) {
                console.error('API Error:', error);
                
                if (retryCount < CONFIG.MAX_RETRY) {
                    console.log(`Retrying... (${retryCount + 1}/${CONFIG.MAX_RETRY})`);
                    await new Promise(resolve => setTimeout(resolve, 500 * (retryCount + 1)));
                    return callGAS(path, data, retryCount + 1);
                }
                
                return { success: false, message: 'connection error' };
            }
        }

        // ========== DEBOUNCED RENDERING ==========
        // ✅ NEW: Prevent excessive DOM updates
        const renderDebounce = {};
        function debounceRender(key, fn, delay = CONFIG.DEBOUNCE_RENDER) {
            clearTimeout(renderDebounce[key]);
            renderDebounce[key] = setTimeout(fn, delay);
        }

        // ========== ROOMS ==========
        async function loadRooms() {
            try {
                // ✅ OPTIMIZED: Use deduplication
                if (isCacheValid('rooms') && state.rooms.length > 0) {
                    renderRooms();
                    return;
                }

                const result = await callGASWithDedup('rooms');
                
                if (result.success) {
                    state.rooms = result.data || [];
                    localStorage.setItem('rooms_cache', JSON.stringify(state.rooms));
                    updateCacheTimestamp('rooms');
                    renderRooms();
                }
            } catch (error) {
                console.error('Load rooms error:', error);
            }
        }

        function renderRooms() {
            debounceRender('rooms', () => {
                if (!$.roomsList) return;
                
                if (!state.rooms || state.rooms.length === 0) {
                    $.roomsList.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 40px 20px;">ไม่มีห้องประชุม</div>';
                    return;
                }

                const html = state.rooms.map(room => `
                    <div class="room-card" onclick="selectRoom('${room.roomId}')">
                        <div class="room-image">
                            <i class="fas fa-door-open" style="font-size: 48px; color: var(--primary);"></i>
                        </div>
                        <div class="room-content">
                            <div style="font-weight: 600; margin-bottom: 8px;">${room.name || 'ห้องประชุม'}</div>
                            <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">
                                <i class="fas fa-users mr-1"></i>ความจุ: ${room.capacity || 0} คน
                            </div>
                            <div class="badge badge-available">
                                <i class="fas fa-check-circle mr-1"></i>ว่าง
                            </div>
                        </div>
                    </div>
                `).join('');

                $.roomsList.innerHTML = html;
            });
        }

        // ========== LIFF INIT ==========
        async function initLIFF() {
            try {
                if (state.user) {
                    state.role = state.user.role || 'user';
                    updateUserUI(state.user);
                    
                    if (isCacheValid('rooms') && state.rooms.length > 0) {
                        renderRooms();
                        $.initLoading.classList.add('hide');
                    } else {
                        renderSkeletonRooms();
                    }
                }

                // ✅ OPTIMIZED: Wait for LIFF init
                if (typeof liff !== 'undefined') {
                    await liff.init({ liffId: CONFIG.LIFF_ID });
                    
                    if (!liff.isLoggedIn()) {
                        liff.login({ 
                            scope: 'openid email profile',
                            prompt: 'consent'
                        });
                        return;
                    }

                    const profile = await liff.getProfile();
                    
                    const userData = {
                        lineUserId: profile.userId,
                        displayName: profile.displayName,
                        pictureUrl: profile.pictureUrl || '',
                        email: '',
                        source: 'miniapp'
                    };

                    // ✅ OPTIMIZED: Parallel loading
                    const [userResult, roomsResult] = await Promise.all([
                        callGASWithDedup('user/profile', userData),
                        callGASWithDedup('rooms')
                    ]);

                    if (userResult.success) {
                        state.user = userResult.data;
                        state.role = state.user.role || 'user';
                        localStorage.setItem('user_cache', JSON.stringify(state.user));
                        updateUserUI(state.user);
                    }

                    if (roomsResult.success) {
                        state.rooms = roomsResult.data || [];
                        localStorage.setItem('rooms_cache', JSON.stringify(state.rooms));
                        updateCacheTimestamp('rooms');
                        renderRooms();
                    }

                    $.initLoading.classList.add('hide');
                    $.tabNav.style.display = 'block';
                    state.initialized = true;

                    // ✅ LAZY LOAD: Load admin data only when needed
                    if (state.role === 'admin' || state.role === 'manager') {
                        loadAdminDataLazy();
                    }
                }
            } catch (error) {
                console.error('LIFF init error:', error);
                $.initLoading.classList.add('hide');
            }
        }

        // ✅ NEW: Lazy load admin data
        function loadAdminDataLazy() {
            setTimeout(() => {
                Promise.all([
                    loadAdminStats().catch(console.warn),
                    loadPendingBookings().catch(console.warn)
                ]).catch(console.warn);
            }, 2000);
        }

        function renderSkeletonRooms() {
            if (!$.roomsList) return;
            $.roomsList.innerHTML = `
                <div class="skeleton-room"></div>
                <div class="skeleton-room"></div>
                <div class="skeleton-room"></div>
            `;
        }

        function updateUserUI(user) {
            if (!user) return;
            $.navbarUser.textContent = user.displayName || 'ผู้ใช้';
        }

        async function loadAdminStats() {
            try {
                const result = await callGASWithDedup('admin/stats');
                if (result.success) {
                    console.log('Admin stats loaded:', result.data);
                }
            } catch (error) {
                console.error('Load admin stats error:', error);
            }
        }

        async function loadPendingBookings() {
            try {
                const result = await callGASWithDedup('admin/pending-bookings');
                if (result.success) {
                    state.pendingBookings = result.data || [];
                    console.log('Pending bookings loaded:', state.pendingBookings.length);
                }
            } catch (error) {
                console.error('Load pending bookings error:', error);
            }
        }

        function selectRoom(roomId) {
            console.log('Selected room:', roomId);
            // TODO: Implement room selection logic
        }

        // ========== TAB NAVIGATION ==========
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const tab = this.dataset.nav;
                switchTab(tab);
            });
        });

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`.nav-item[data-nav="${tab}"]`)?.classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`${tab}-tab`)?.classList.add('active');
        }

        // ========== INIT ==========
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initLIFF);
        } else {
            initLIFF();
        }

        // ✅ NEW: Service Worker registration for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
